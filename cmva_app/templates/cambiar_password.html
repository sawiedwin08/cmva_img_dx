{% extends "base.html" %}
{% block title %}Cambiar Contraseña – CMVA{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header cmva-card-header">
        <h5 class="mb-0"><i class="fa-solid fa-key me-2"></i>Cambiar Contraseña</h5>
      </div>
      <div class="card-body">
        <form method="POST" action="/cambiar-password">
          <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña actual <span class="text-danger">*</span></label>
            <input type="password" name="password_actual" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password_nuevo" class="form-control" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar nueva contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password_confirmar" class="form-control" required minlength="6">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn cmva-btn-primary">
              <i class="fa-solid fa-floppy-disk me-2"></i>Guardar
            </button>
            <a href="/registros" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
