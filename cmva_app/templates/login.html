<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión – CMVA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
  <style>
    body { background: linear-gradient(135deg, #1a3c5e 0%, #2980b9 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 420px; width: 100%; }
    .login-header { background: #1a3c5e; border-radius: 12px 12px 0 0; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center">
  <div class="login-card">
    <div class="card shadow-lg border-0">
      <div class="login-header p-4 text-center text-white">
        <i class="fa-solid fa-x-ray fa-3x mb-2"></i>
        <h4 class="mb-0 fw-bold">CMVA</h4>
        <p class="mb-0 opacity-75">Centro Médico Valle de Atriz<br>Imágenes Diagnósticas – Rayos X</p>
      </div>
      <div class="card-body p-4">
        {% if flash and flash.error %}
        <div class="alert alert-danger">
          <i class="fa-solid fa-circle-exclamation me-2"></i>{{ flash.error }}
        </div>
        {% endif %}
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
              <input type="text" name="usuario" class="form-control" placeholder="Nombre de usuario"
                     required autofocus autocomplete="username">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Contraseña"
                     required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn cmva-btn-primary w-100 fw-semibold py-2">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
          </button>
        </form>
      </div>
      <div class="card-footer text-center text-muted small py-3">
        CMVA © {{ now().year }} – Sistema de Registro Radiológico
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
